<!-- Emoji Nook app icon — two-emoji variant -->
<!-- (c) Copyright 2026 Liminal HQ, Scott Morris -->
<!-- SPDX-License-Identifier: Apache-2.0 OR MIT -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Dark container — matches Liminal HQ ink base -->
    <linearGradient id="bg" x1="12" y1="8" x2="244" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E0D12"/>
      <stop offset="0.55" stop-color="#0A0A0D"/>
      <stop offset="1" stop-color="#08080B"/>
    </linearGradient>

    <!-- Subtle ambient lift -->
    <radialGradient id="bloom" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(92 70) rotate(90) scale(256 256)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.018"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.006"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Liminal brand stroke gradient — plum through orange to amber -->
    <linearGradient id="brandStroke" x1="34" y1="40" x2="222" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5D3147"/>
      <stop offset="0.55" stop-color="#CF5D22"/>
      <stop offset="1" stop-color="#F19B18"/>
    </linearGradient>

    <!-- Warm glow behind the nook opening -->
    <radialGradient id="nookGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(128 134) rotate(90) scale(96 72)">
      <stop offset="0" stop-color="#F7E2BA" stop-opacity="0.3"/>
      <stop offset="0.5" stop-color="#F19B18" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#F19B18" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Container — same as Liminal HQ mark -->
  <rect x="0" y="0" width="256" height="256" rx="58" fill="url(#bg)"/>
  <rect x="0" y="0" width="256" height="256" rx="58" fill="url(#bloom)"/>

  <!-- Warm glow behind the nook -->
  <g filter="url(#softGlow)">
    <ellipse cx="128" cy="134" rx="72" ry="62" fill="url(#nookGlow)"/>
  </g>

  <!-- Nook border — closed rounded rectangle -->
  <rect x="30" y="46" width="196" height="164" rx="22" stroke="url(#brandStroke)" stroke-width="16" stroke-linejoin="round" fill="none"/>

  <!-- Faint grid inside the nook — evokes the emoji picker grid -->
  <g opacity="0.04" stroke="#F7E2BA" stroke-width="0.75">
    <!-- Vertical lines -->
    <line x1="80" y1="58" x2="80" y2="198"/>
    <line x1="128" y1="58" x2="128" y2="198"/>
    <line x1="176" y1="58" x2="176" y2="198"/>
    <!-- Horizontal lines -->
    <line x1="38" y1="90" x2="218" y2="90"/>
    <line x1="38" y1="128" x2="218" y2="128"/>
    <line x1="38" y1="166" x2="218" y2="166"/>
  </g>

  <!-- Two emoji centred in the nook -->
  <!-- Nook interior: x=46..210, y=56..200 -->
  <!-- Each cell ~52px wide, centres at x=96 and x=160 -->

  <!-- Left emoji — smiley face (with selection highlight box) -->
  <g transform="translate(94, 134)">
    <!-- Selection highlight — light box behind the picked emoji -->
    <rect x="-30" y="-30" width="60" height="60" rx="12" fill="#fbbf24" opacity="0.12"/>
    <rect x="-30" y="-30" width="60" height="60" rx="12" fill="none" stroke="#fbbf24" stroke-width="1.75" opacity="0.4"/>
    <!-- Face circle -->
    <circle r="24" fill="#fbbf24" opacity="0.15"/>
    <circle r="24" stroke="#fbbf24" stroke-width="3.25" fill="none" opacity="0.6"/>
    <!-- Eyes -->
    <circle cx="-8" cy="-6" r="3.2" fill="#F7E2BA" opacity="0.85"/>
    <circle cx="8" cy="-6" r="3.2" fill="#F7E2BA" opacity="0.85"/>
    <!-- Smile -->
    <path d="M-9 5 Q0 15 9 5" stroke="#F7E2BA" stroke-width="3.2" stroke-linecap="round" fill="none" opacity="0.85"/>
  </g>

  <!-- Right emoji — heart (no circle, the heart IS the emoji) -->
  <g transform="translate(162, 134)">
    <!-- Heart shape scaled to match smiley size (~36px tall) -->
    <path d="M0 22 C-10 8 -27 -4 -27 -14 C-27 -24 -20 -29 -13 -29 C-5 -29 -1 -24 0 -20 C1 -24 5 -29 13 -29 C20 -29 27 -24 27 -14 C27 -4 10 8 0 22Z"
          fill="#F7E2BA" opacity="0.8"/>
  </g>

</svg>
