<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" role="img" aria-labelledby="pipe-title pipe-desc">
  <title id="pipe-title">Emoji Selection Pipeline</title>
  <desc id="pipe-desc">Left-to-right pipeline showing a global shortcut activating the picker, emoji selection flowing through IPC to the Rust backend, and injection into the target application via portal or clipboard shuffle.</desc>

  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#0f1628"/>
      <stop offset="100%" stop-color="#1a0e2e"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="0 0;0.02 0.01;0 0" dur="20s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Grid dots -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#ffffff0a"/>
    </pattern>

    <!-- Zone gradients -->
    <linearGradient id="z-shortcut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="z-picker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="z-ipc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="z-inject" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="z-target" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>

    <!-- Pipeline gradient -->
    <linearGradient id="pipeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="25%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="75%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#f43f5e"/>
    </linearGradient>

    <!-- Arrow -->
    <marker id="arrowGold" viewBox="0 0 12 8" refX="10" refY="4" markerWidth="12" markerHeight="8" orient="auto">
      <path d="M0 0 L12 4 L0 8 L2 4 Z" fill="#fbbf24"/>
    </marker>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000040"/>
    </filter>

    <style>
      .heading { font: 700 28px "Space Grotesk", "Inter", system-ui, sans-serif; fill: #fbbf24; letter-spacing: -0.02em; }
      .sub { font: 500 13px "Inter", system-ui, sans-serif; fill: #8892a8; }
      .stageTitle { font: 700 14px "Space Grotesk", "Inter", system-ui, sans-serif; fill: #fff; letter-spacing: 0.02em; }
      .stageNum { font: 800 48px "Space Grotesk", system-ui, sans-serif; fill: #ffffff08; }
      .fn { font: 600 11.5px "JetBrains Mono", "Fira Code", monospace; fill: #1a1a2e; }
      .fnAccent { font: 700 11.5px "JetBrains Mono", "Fira Code", monospace; }
      .detail { font: 500 11px "JetBrains Mono", "Fira Code", monospace; fill: #b4bfce; }
      .label { font: 600 11px "JetBrains Mono", monospace; fill: #fbbf24; letter-spacing: 0.05em; }
    </style>
  </defs>

  <!-- Background layers -->
  <rect width="1400" height="520" rx="14" fill="url(#bgGrad)"/>
  <rect width="1400" height="520" rx="14" fill="url(#dots)"/>

  <!-- Ambient orbs -->
  <g opacity="0.06">
    <circle cx="140" cy="400" r="150" fill="#fbbf24">
      <animate attributeName="r" values="150;165;150" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="100" r="200" fill="#818cf8">
      <animate attributeName="r" values="200;215;200" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1200" cy="350" r="160" fill="#2dd4bf">
      <animate attributeName="r" values="160;175;160" dur="18s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Title -->
  <text x="50" y="46" class="heading">EMOJI SELECTION PIPELINE</text>
  <text x="50" y="66" class="sub">Global shortcut → picker → IPC → injection → target application</text>

  <!-- ═══ MAIN PIPELINE TRACK ═══ -->
  <path d="M100 260 L1300 260" stroke="url(#pipeGrad)" stroke-width="6" fill="none" opacity="0.25" stroke-linecap="round"/>

  <!-- Animated pulse on pipeline -->
  <circle r="5" fill="#fbbf24" opacity="0.85">
    <animateMotion dur="5s" repeatCount="indefinite" path="M100 260 L1300 260"/>
    <animate attributeName="opacity" values="0.4;1;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Forward arrows -->
  <g filter="url(#glow)">
    <path d="M270 260 L310 260" fill="none" stroke="#fbbf24" stroke-width="4" marker-end="url(#arrowGold)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M530 260 L570 260" fill="none" stroke="#fbbf24" stroke-width="4" marker-end="url(#arrowGold)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </path>
    <path d="M790 260 L830 260" fill="none" stroke="#fbbf24" stroke-width="4" marker-end="url(#arrowGold)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M1050 260 L1090 260" fill="none" stroke="#fbbf24" stroke-width="4" marker-end="url(#arrowGold)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ═══ STAGE 1: SHORTCUT ═══ -->
  <g transform="translate(80, 100)">
    <text x="95" y="10" class="stageNum" text-anchor="middle">01</text>
    <rect width="190" height="130" rx="10" fill="#0f1520" stroke="#fbbf2430" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect width="190" height="4" rx="2" fill="url(#z-shortcut)"/>
    <text x="16" y="28" class="stageTitle">SHORTCUT</text>
    <text x="16" y="50" class="fn">Alt + Shift + E</text>
    <line x1="16" y1="62" x2="174" y2="62" stroke="#ffffff10" stroke-width="1"/>
    <text x="16" y="80" class="detail">Wayland: xdg-portal</text>
    <text x="16" y="96" class="detail">X11: global-shortcut</text>
    <text x="16" y="118" class="detail" style="fill:#fbbf24;">→ show_picker()</text>
  </g>

  <!-- ═══ STAGE 2: PICKER ═══ -->
  <g transform="translate(330, 100)">
    <text x="110" y="10" class="stageNum" text-anchor="middle">02</text>
    <rect width="220" height="130" rx="10" fill="#0f1520" stroke="#f9731630" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect width="220" height="4" rx="2" fill="url(#z-picker)"/>
    <text x="16" y="28" class="stageTitle">EMOJI PICKER</text>
    <text x="16" y="50" class="fn">Frimousse (React 19)</text>
    <line x1="16" y1="62" x2="204" y2="62" stroke="#ffffff10" stroke-width="1"/>
    <text x="16" y="80" class="detail">Search, categories, skin tones</text>
    <text x="16" y="96" class="detail">Arrow keys + Enter to select</text>
    <text x="16" y="118" class="detail" style="fill:#f97316;">→ onEmojiSelect(😀)</text>
  </g>

  <!-- ═══ STAGE 3: IPC ═══ -->
  <g transform="translate(600, 100)">
    <text x="100" y="10" class="stageNum" text-anchor="middle">03</text>
    <rect width="200" height="130" rx="10" fill="#0f1520" stroke="#818cf830" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect width="200" height="4" rx="2" fill="url(#z-ipc)"/>
    <text x="16" y="28" class="stageTitle">TAURI IPC</text>
    <text x="16" y="50" class="fn">invoke("insert_emoji")</text>
    <line x1="16" y1="62" x2="184" y2="62" stroke="#ffffff10" stroke-width="1"/>
    <text x="16" y="80" class="detail">Frontend → Rust backend</text>
    <text x="16" y="96" class="detail">Hide window</text>
    <text x="16" y="118" class="detail" style="fill:#818cf8;">→ inject(emoji)</text>
  </g>

  <!-- ═══ STAGE 4: INJECTION ═══ -->
  <g transform="translate(860, 100)">
    <text x="100" y="10" class="stageNum" text-anchor="middle">04</text>
    <rect width="200" height="130" rx="10" fill="#0f1520" stroke="#2dd4bf30" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect width="200" height="4" rx="2" fill="url(#z-inject)"/>
    <text x="16" y="28" class="stageTitle">INJECTION</text>
    <text x="16" y="50" class="fn">RemoteDesktop / enigo</text>
    <line x1="16" y1="62" x2="184" y2="62" stroke="#ffffff10" stroke-width="1"/>
    <text x="16" y="80" class="detail">Wayland: portal session</text>
    <text x="16" y="96" class="detail">X11: xdotool keystrokes</text>
    <text x="16" y="118" class="detail" style="fill:#2dd4bf;">fallback: clipboard shuffle</text>
  </g>

  <!-- ═══ STAGE 5: TARGET ═══ -->
  <g transform="translate(1120, 100)">
    <text x="110" y="10" class="stageNum" text-anchor="middle">05</text>
    <rect width="220" height="130" rx="10" fill="#0f1520" stroke="#f43f5e30" stroke-width="1.5" filter="url(#cardShadow)"/>
    <rect width="220" height="4" rx="2" fill="url(#z-target)"/>
    <text x="16" y="28" class="stageTitle">TARGET APP</text>
    <text x="40" y="80" font-size="36" opacity="0.8">😀</text>
    <text x="90" y="76" class="fn" style="fill:#f43f5e;">appears in</text>
    <text x="90" y="92" class="fn" style="fill:#f43f5e;">focused field</text>
    <text x="16" y="118" class="detail" style="fill:#8892a8;">Focus returned by OS</text>
  </g>

  <!-- ═══ CLIPBOARD SHUFFLE (bottom path) ═══ -->
  <path d="M960 310 C960 400, 800 420, 700 420 C600 420, 400 410, 300 390"
        fill="none" stroke="#f43f5e" stroke-width="2" stroke-dasharray="8 6" opacity="0.3">
    <animate attributeName="stroke-dashoffset" values="0;-28" dur="2s" repeatCount="indefinite"/>
  </path>
  <text x="560" y="440" class="label" text-anchor="middle" style="font-size:10px; fill:#f43f5e80;">CLIPBOARD SHUFFLE: SAVE → WRITE EMOJI → CTRL+V → RESTORE</text>

  <!-- ═══ WAYLAND / X11 LABELS ═══ -->
  <g transform="translate(50, 300)">
    <rect width="100" height="24" rx="6" fill="#fbbf2410" stroke="#fbbf2430" stroke-width="1"/>
    <text x="50" y="17" text-anchor="middle" class="label" style="font-size:10px;">WAYLAND</text>
  </g>
  <g transform="translate(160, 300)">
    <rect width="60" height="24" rx="6" fill="#818cf810" stroke="#818cf830" stroke-width="1"/>
    <text x="30" y="17" text-anchor="middle" class="label" style="font-size:10px; fill:#818cf8;">X11</text>
  </g>

  <!-- Window lifecycle indicators -->
  <g transform="translate(50, 460)">
    <circle cx="8" cy="8" r="6" fill="#2dd4bf" opacity="0.7"/>
    <text x="22" y="12" class="detail">hidden → visible → interact → hide → focus returns</text>
  </g>
  <g transform="translate(50, 482)">
    <circle cx="8" cy="8" r="6" fill="#f97316" opacity="0.7"/>
    <text x="22" y="12" class="detail">Esc or click-outside dismisses, shortcut toggles</text>
  </g>
</svg>
